services:
  etl:
    build: .
    container_name: etl
    restart: "no"
    environment:
      DATA_DIR: /data
      # La construction des index ART (PRIMARY KEY) ne déborde pas sur disque :
      # dimensionné pour ~16 M de lignes, avec une VM Docker de 8 Go
      DUCKDB_MEMORY_LIMIT: 8GB
    volumes:
      - dvf_data:/data

  app:
    build: .
    container_name: app
    command: ["streamlit", "run", "app.py", "--server.address=0.0.0.0"]
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DB_PATH: /data/foncier.db
    volumes:
      # Lecture seule : seul le pipeline ELT écrit
      - dvf_data:/data
    depends_on:
      etl:
        condition: service_completed_successfully

volumes:
  dvf_data:
